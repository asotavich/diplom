# =============================================================================
# FEAnalyzer — Production Docker Compose stack
# Services:
#   db        — PostgreSQL 16
#   redis     — Redis 7 (Celery broker + result backend)
#   web       — Django + Gunicorn
#   celery    — Celery worker (shares the web image)
#   frontend  — Nginx + built React SPA; also reverse-proxies /api, /admin,
#               /healthz to ``web`` and serves /static + /media from shared
#               volumes. Replaces the stand-alone ``nginx`` service.
# =============================================================================

services:

  db:
    image: postgres:16-alpine
    container_name: feanalyzer_db
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-feanalyzer_db}
      POSTGRES_USER: ${POSTGRES_USER:-feanalyzer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feanalyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: feanalyzer_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: feanalyzer-web:latest
    container_name: feanalyzer_web
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DJANGO_MIGRATE: "1"
      DJANGO_COLLECTSTATIC: "1"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-test-key-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
      POSTGRES_DB: ${POSTGRES_DB:-feanalyzer_db}
      POSTGRES_USER: ${POSTGRES_USER:-feanalyzer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feanalyzer}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/mediafiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  celery:
    image: feanalyzer-web:latest
    container_name: feanalyzer_celery
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      DJANGO_MIGRATE: "0"
      DJANGO_COLLECTSTATIC: "0"
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-test-key-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
      DJANGO_LOG_LEVEL: ${DJANGO_LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080}
      POSTGRES_DB: ${POSTGRES_DB:-feanalyzer_db}
      POSTGRES_USER: ${POSTGRES_USER:-feanalyzer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-feanalyzer}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    # Share the same media_volume as the web container so file uploads
    # (FR-03) written by Django are visible to the Celery worker. Without
    # this mount the worker raises FileNotFoundError on
    # ``/app/mediafiles/uploads/...`` because each container has its own
    # ephemeral copy of that path.
    volumes:
      - media_volume:/app/mediafiles
    command: celery -A frontend_analyzer worker --loglevel=info --concurrency=2
    depends_on:
      web:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: feanalyzer-frontend:latest
    container_name: feanalyzer_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
    depends_on:
      - web
    networks:
      - backend

# =============================================================================
# Named volumes (survive `docker compose down`; removed only with `-v`).
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

# =============================================================================
# Private internal network. Only ``frontend`` publishes a port to the host.
# =============================================================================
networks:
  backend:
    driver: bridge
