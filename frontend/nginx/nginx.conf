# =============================================================================
# FEAnalyzer — combined SPA + reverse-proxy server block
#
# Responsibilities
#   * Serve the compiled React SPA from /usr/share/nginx/html, including
#     the SPA fallback so React Router can handle deep links.
#   * Proxy /api/, /admin/, /healthz/ to Gunicorn (service: web).
#   * Serve Django's collected static files and user-uploaded media from
#     the shared named volumes.
# TLS termination happens at a separate layer (Let's Encrypt via certbot,
# or a cloud load balancer in front of this container). This file
# intentionally listens on plain :80; the upstream LB is expected to
# terminate TLS and forward ``X-Forwarded-Proto: https`` so Django's
# SECURE_SSL_REDIRECT (audit M-1) can short-circuit accidental HTTP
# traffic. For self-managed deployments, see the commented ``:443`` server
# block at the bottom of this file.
# =============================================================================

upstream django_app {
    server web:8000 fail_timeout=5s;
    keepalive 16;
}

# Lightweight DoS protection on the API surface.
limit_req_zone $binary_remote_addr zone=feanalyzer_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Upload / buffer limits ------------------------------------------
    client_max_body_size 20M;
    client_body_timeout 60s;
    client_header_timeout 20s;
    send_timeout 60s;

    # --- Security headers ------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy   "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # Audit M-2: keep script-src strict ('self' only — no unsafe-inline).
    # style-src must allow 'unsafe-inline' for Tailwind 4 / React inline
    # styles; this is documented and accepted as a residual risk.
    # Audit M-2: strict CSP. All values MUST be in one single string.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # --- Gzip ------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Django collected static (admin + whitenoise fallback) -----------
    location /static/ {
        alias /var/www/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- User-uploaded media --------------------------------------------
    # Hardened against stored-XSS via uploaded HTML (FR-03):
    #   * Force download (Content-Disposition: attachment).
    #   * Override the MIME so browsers do not render HTML inline.
    #   * Apply a sandboxed CSP scoped to this response only.
    location /media/ {
        alias /var/www/media/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'none'; sandbox" always;
        add_header Content-Disposition "attachment" always;
        types { }
        default_type application/octet-stream;
    }

    # --- SPA build assets (Vite emits them to /assets/*) ----------------
    # Long-cache hashed filenames; index.html stays uncached so new
    # deployments take effect on the next navigation.
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Django health probe --------------------------------------------
    location = /healthz/ {
        proxy_pass http://django_app;
        access_log off;
    }

    # --- REST API (rate-limited) ----------------------------------------
    location /api/ {
        limit_req zone=feanalyzer_api burst=20 nodelay;
        proxy_pass http://django_app;
        include /etc/nginx/snippets/proxy_headers.conf;
    }

    # --- Django admin ---------------------------------------------------
    location /admin/ {
        proxy_pass http://django_app;
        include /etc/nginx/snippets/proxy_headers.conf;
    }

    # --- SPA fallback (must come last) ----------------------------------
    # Serve the file if it exists, otherwise hand the route to React
    # Router by returning index.html.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, max-age=0" always;
    }
}

# =============================================================================
# Self-managed TLS template (audit M-1) — uncomment for deployments where
# this container terminates HTTPS itself instead of sitting behind a TLS-
# terminating LB. Mount the certificate / key as Docker secrets or read-
# only volumes at the paths below, then convert the existing :80 server
# above to a redirect-only stub.
#
# server {
#     listen 80;
#     listen [::]:80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }
#
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name _;
#
#     ssl_certificate     /etc/nginx/tls/fullchain.pem;
#     ssl_certificate_key /etc/nginx/tls/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#     add_header Strict-Transport-Security
#         "max-age=31536000; includeSubDomains; preload" always;
#
#     # ... (paste the contents of the :80 server block here) ...
# }
# =============================================================================
